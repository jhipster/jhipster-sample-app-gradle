# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: jhipstergradlesampleapplication
services:
  app:
    image: jhipstergradlesampleapplication
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs,secret-samples
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
      - SPRING_SECURITY_REMEMBER_ME_KEY=e48612ba1fd46fa7089fe9f5085d8d164b53ffb2
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/jhipstergradlesampleapplication?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_LIQUIBASE_URL=jdbc:mysql://mysql:3306/jhipstergradlesampleapplication?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
    ports:
      - 127.0.0.1:8080:8080
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET
          /management/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3;
          grep -q \"\\\"status\\\":\\\"UP\\\"\" <&3'"
      interval: 5s
      timeout: 5s
      retries: 40
    depends_on:
      mysql:
        condition: service_healthy
  mysql:
    extends:
      file: ./mysql.yml
      service: mysql
